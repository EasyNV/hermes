# deploy/nginx/web.conf — in-container nginx config for the hermes-web image.
#
# Serves the React SPA build with cache headers tuned for hashed assets,
# falls back to /index.html for client-side routes, and exposes a /healthz
# probe for compose healthchecks + the chunk-4 readiness wiring.
#
# This is the *container's* server. The TLS-terminating reverse proxy in
# front of the stack (Caddyfile / nginx ref in chunk 5) handles /api/* and
# /ws routing to the gateway.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────────────────
    # Any path that doesn't map to a file or directory serves the SPA shell.
    # Example: /inbox/123 → returns /index.html, React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Hashed assets ────────────────────────────────────────────────────
    # Vite emits content-hashed filenames under /assets/. Safe to cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA shell ────────────────────────────────────────────────────────
    # Never cache /index.html so deploys propagate immediately.
    # NB: do NOT use `expires` here — it injects a competing Cache-Control
    # header. add_header alone is cleaner and `no-store` is the strict
    # value we want browsers (and intermediate proxies) to honour.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Health probe ─────────────────────────────────────────────────────
    # Lets the compose healthcheck use the same "real probe" pattern as the
    # Go services (chunk 4 will unify on /readyz across all containers).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Compression ──────────────────────────────────────────────────────
    # gzip only (brotli is module-extra in nginx:alpine and not worth the
    # custom image build at this stage).
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/octet-stream
        image/svg+xml
        font/woff
        font/woff2;
}
